<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    .card { fill: #161b22; rx: 10; }
    .title { font: 600 14px 'Segoe UI', sans-serif; fill: #e6edf3; }
    .lang  { font: 600 13px 'Segoe UI', sans-serif; }
    .pct   { font: 400 12px 'Segoe UI', sans-serif; fill: #8b949e; }
    .bar-bg { fill: #21262d; }
  </style>

  <!-- Card background -->
  <rect width="400" height="180" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="22" y="32" class="title">Most Used Languages</text>

  <!-- Progress bar background -->
  <rect x="22" y="48" width="356" height="10" rx="5" class="bar-bg"/>

  <!-- Progress bar segments -->
  <!-- Python 70% = 249px -->
  <rect x="22"   y="48" width="249" height="10" rx="0" fill="#3572A5"/>
  <!-- Left cap -->
  <rect x="22"   y="48" width="10"  height="10" rx="5" fill="#3572A5"/>
  <!-- C++ 13% = 46px -->
  <rect x="271"  y="48" width="46"  height="10" rx="0" fill="#f34b7d"/>
  <!-- C 7% = 25px -->
  <rect x="317"  y="48" width="25"  height="10" rx="0" fill="#555555"/>
  <!-- HTML 5% = 18px -->
  <rect x="342"  y="48" width="18"  height="10" rx="0" fill="#e34c26"/>
  <!-- CSS 3% = 11px -->
  <rect x="360"  y="48" width="11"  height="10" rx="0" fill="#563d7c"/>
  <!-- JS 2% = 7px — right cap -->
  <rect x="371"  y="48" width="7"   height="10" rx="0" fill="#f1e05a"/>
  <rect x="368"  y="48" width="10"  height="10" rx="5" fill="#f1e05a"/>

  <!-- Language legend — row 1 -->
  <!-- Python -->
  <circle cx="32"  cy="90" r="6" fill="#3572A5"/>
  <text x="44" y="94" class="lang" fill="#e6edf3">Python</text>
  <text x="44" y="108" class="pct">70.00%</text>

  <!-- C++ -->
  <circle cx="132" cy="90" r="6" fill="#f34b7d"/>
  <text x="144" y="94" class="lang" fill="#e6edf3">C++</text>
  <text x="144" y="108" class="pct">13.00%</text>

  <!-- C -->
  <circle cx="222" cy="90" r="6" fill="#555555"/>
  <text x="234" y="94" class="lang" fill="#e6edf3">C</text>
  <text x="234" y="108" class="pct">7.00%</text>

  <!-- HTML -->
  <circle cx="282" cy="90" r="6" fill="#e34c26"/>
  <text x="294" y="94" class="lang" fill="#e6edf3">HTML</text>
  <text x="294" y="108" class="pct">5.00%</text>

  <!-- Language legend — row 2 -->
  <!-- CSS -->
  <circle cx="32"  cy="138" r="6" fill="#563d7c"/>
  <text x="44" y="142" class="lang" fill="#e6edf3">CSS</text>
  <text x="44" y="156" class="pct">3.00%</text>

  <!-- JavaScript -->
  <circle cx="122" cy="138" r="6" fill="#f1e05a"/>
  <text x="134" y="142" class="lang" fill="#e6edf3">JavaScript</text>
  <text x="134" y="156" class="pct">2.00%</text>
</svg>
